<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="description" content="TodayOS — 30 秒內掌握今天最重要的事情。" />
  <title>TodayOS — 今天</title>

  <!-- PWA 設定 -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TodayOS" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

  <!-- 樣式表 -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- App 主容器 -->
  <div id="app">

    <!-- ========================================
         View 1／Dashboard
         由上而下依序排列卡片。每張卡片皆有「有資料」與
         「空狀態」兩種顯示，沒有資料時不顯示任何假數字，
         只給簡潔提示與新增入口。
    ========================================= -->
    <main class="view dashboard fade-in" id="view-dashboard" data-view="home">

      <!-- ① TODAY 卡：倒數 + 日期／星期／天氣（天氣目前無真實資料來源，先留空） -->
      <section class="card card--today" id="card-today" aria-label="今日總覽">
        <p class="card__eyebrow">TODAY</p>

        <div class="today__row">
          <div class="today__main">
            <div class="today__content" id="today-content" hidden>
              <p class="today__countdown">
                <span class="today__number" id="today-days-left">0</span>
                <span class="today__unit">天</span>
              </p>
              <p class="today__subtitle">
                距離 <span id="today-event-name"></span>
              </p>
              <div class="progress-bar" role="progressbar" aria-label="倒數進度" aria-valuemin="0" aria-valuemax="100" id="today-progress" aria-valuenow="0">
                <div class="progress-bar__fill" id="today-progress-fill"></div>
              </div>
            </div>

            <div class="empty-state" id="today-empty">
              <p class="empty-state__text">尚未建立倒數</p>
              <button class="empty-state__action" id="today-add-btn" type="button">＋ 新增倒數</button>
            </div>
          </div>

          <div class="today__date">
            <time class="date__number" id="date-number">07 / 14</time>
            <p class="date__weekday" id="date-weekday">Tuesday</p>
            <p class="date__weather" id="date-weather" hidden>
              <span id="weather-temp"></span>
              <span id="weather-condition"></span>
            </p>
          </div>
        </div>
      </section>

      <!-- ② 經期卡：尚無資料來源，一律顯示空狀態 -->
      <section class="card card--cycle" id="card-cycle" aria-label="經期追蹤">
        <div class="cycle__content" id="cycle-content" hidden>
          <div class="cycle__ring-wrap">
            <svg class="cycle__ring" viewBox="0 0 120 120" width="96" height="96" aria-hidden="true">
              <circle class="cycle__ring-track" cx="60" cy="60" r="52" />
              <circle class="cycle__ring-progress" id="cycle-ring-progress" cx="60" cy="60" r="52" />
            </svg>
            <div class="cycle__ring-label">
              <span class="cycle__day-number" id="cycle-day">Day 1</span>
            </div>
          </div>
          <p class="cycle__next" id="cycle-next"></p>
        </div>

        <div class="empty-state" id="cycle-empty">
          <p class="empty-state__text">尚未建立經期資料</p>
          <button class="empty-state__action" id="cycle-add-btn" type="button">＋ 新增</button>
        </div>
      </section>

      <!-- ③ 今日行程：讀取月曆事件，可點擊 -->
      <section class="card card--schedule" id="card-schedule" aria-label="今日行程">
        <h2 class="card__title">今日行程</h2>
        <ul class="schedule-list" id="schedule-list">
          <!-- 項目或空狀態由 app.js 動態渲染 -->
        </ul>
      </section>

      <!-- ④ 今日飲食：尚無資料來源，一律顯示空狀態 -->
      <section class="card card--diet" id="card-diet" aria-label="今日飲食">
        <h2 class="card__title">今日飲食</h2>

        <div class="diet__content" id="diet-content" hidden>
          <p class="diet__kcal">
            <span id="diet-current">0</span>
            <span class="diet__kcal-divider">/</span>
            <span id="diet-goal">0</span>
            <span class="diet__kcal-unit">kcal</span>
          </p>
          <div class="progress-bar" role="progressbar" aria-label="今日飲食進度" aria-valuemin="0" aria-valuemax="100" id="diet-progress" aria-valuenow="0">
            <div class="progress-bar__fill" id="diet-progress-fill"></div>
          </div>
        </div>

        <div class="empty-state" id="diet-empty">
          <p class="empty-state__text">尚未開始記錄飲食</p>
          <button class="empty-state__action" id="diet-add-btn" type="button">＋ 新增</button>
        </div>
      </section>

      <!-- ⑤ 本月支出：尚無資料來源，一律顯示空狀態 -->
      <section class="card card--expense" id="card-expense" aria-label="本月支出">
        <h2 class="card__title">本月支出</h2>

        <div class="expense__content" id="expense-content" hidden>
          <p class="expense__amount" id="expense-amount">NT$0</p>
          <div class="progress-bar" role="progressbar" aria-label="本月預算進度" aria-valuemin="0" aria-valuemax="100" id="expense-progress" aria-valuenow="0">
            <div class="progress-bar__fill" id="expense-progress-fill"></div>
          </div>
          <div class="expense__meta">
            <span class="expense__meta-item">Budget <strong id="expense-budget">0</strong></span>
            <span class="expense__meta-item">Remaining <strong id="expense-remaining">0</strong></span>
          </div>
        </div>

        <div class="empty-state" id="expense-empty">
          <p class="empty-state__text">尚未開始記帳</p>
          <button class="empty-state__action" id="expense-add-btn" type="button">＋ 新增</button>
        </div>
      </section>

      <!-- ⑥ 快捷功能：五個按鈕 -->
      <section class="card card--quick-actions" id="card-quick-actions" aria-label="快捷功能">
        <div class="quick-actions">
          <button class="quick-action" data-action="add" type="button">
            <span class="quick-action__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </span>
            <span class="quick-action__label">新增</span>
          </button>
          <button class="quick-action" data-action="calendar" type="button">
            <span class="quick-action__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="22" height="22"><rect x="3.5" y="5" width="17" height="15" rx="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M3.5 9.5h17M8 3v3.5M16 3v3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </span>
            <span class="quick-action__label">月曆</span>
          </button>
          <button class="quick-action" data-action="expense" type="button">
            <span class="quick-action__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.5"/><path d="M12 7.5v9M9.5 9.5a2 2 0 0 1 2-1.5h1a2 2 0 0 1 0 4h-1a2 2 0 0 0 0 4h1a2 2 0 0 0 2-1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            </span>
            <span class="quick-action__label">記帳</span>
          </button>
          <button class="quick-action" data-action="diet" type="button">
            <span class="quick-action__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="22" height="22"><path d="M7 3v7a2 2 0 0 0 2 2v9M7 3v6M9 3v6M11 3v6M17 3c-2 0-3 2.5-3 5.5S15 13 17 13v9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            </span>
            <span class="quick-action__label">飲食</span>
          </button>
          <button class="quick-action" data-action="cycle" type="button">
            <span class="quick-action__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 20s-7-4.5-7-10a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 5.5-7 10-7 10a1 1 0 0 1-4 0z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" fill="none"/></svg>
            </span>
            <span class="quick-action__label">經期</span>
          </button>
        </div>
      </section>

    </main>

    <!-- ========================================
         View 2／Calendar（重新設計：Apple Calendar 風格）
         大標題＋無格線月視圖＋固定日期詳情區（非 Bottom Sheet）。
         事件在月曆格子內僅以小圓點表示，不顯示文字。
         沒有事件的日期不顯示任何標記。
    ========================================= -->
    <main class="view calendar-view fade-in" id="view-calendar" data-view="calendar" hidden>

      <!-- 月曆標頭：左側年份＋超大月份，右側 Today／搜尋／設定 -->
      <header class="cal-header">
        <div class="cal-header__title">
          <p class="cal-header__year" id="calendar-year">2026</p>
          <h1 class="cal-header__month" id="calendar-month">JUL</h1>
        </div>
        <div class="cal-header__actions">
          <button class="cal-pill" id="calendar-today-btn" type="button">
            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M9 7l-5 5 5 5M4.5 12H15a5 5 0 0 0 0-10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            <span>Today</span>
          </button>
          <button class="cal-icon-btn" id="calendar-search-btn" type="button" aria-label="搜尋">
            <svg viewBox="0 0 24 24" width="19" height="19"><circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.6"/><path d="M20 20l-4.3-4.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          </button>
          <button class="cal-icon-btn" id="calendar-settings-btn" type="button" aria-label="設定">
            <svg viewBox="0 0 24 24" width="19" height="19"><circle cx="12" cy="12" r="2.6" stroke="currentColor" stroke-width="1.6"/><path d="M12 4v2.2M12 17.8V20M4 12h2.2M17.8 12H20M6.3 6.3l1.6 1.6M16.1 16.1l1.6 1.6M6.3 17.7l1.6-1.6M16.1 7.9l1.6-1.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          </button>
        </div>
      </header>

      <!-- 星期標頭：週一為首，不加粗、灰色小字 -->
      <div class="cal-weekdays" id="calendar-weekdays" aria-hidden="true">
        <!-- 星期標籤由 app.js 動態渲染 -->
      </div>

      <!-- 月曆格子：不使用格線／卡片／方框，以大量留白呈現 -->
      <div class="cal-grid" id="calendar-grid" role="grid" aria-label="月曆日期">
        <!-- 日期格子由 app.js 動態渲染，支援左右滑動切換月份 -->
      </div>

      <!-- 固定日期詳情區：跟隨頁面捲動，非彈出式 Bottom Sheet -->
      <section class="cal-detail" id="calendar-detail" aria-label="選取日期詳情">
        <p class="cal-detail__date" id="calendar-detail-date">Tue, Jul 14, 2026</p>

        <div class="cal-detail__group" id="calendar-detail-events-group">
          <ul class="cal-detail__list" id="calendar-detail-events"></ul>
        </div>

        <div class="cal-detail__empty" id="calendar-detail-empty" hidden>
          <p class="cal-detail__empty-icon" aria-hidden="true">📅</p>
          <p class="cal-detail__empty-text">這天還沒有任何事件</p>
        </div>

        <button class="cal-pill cal-pill--add" id="calendar-add-event-btn" type="button">
          ＋ 新增事件
        </button>
      </section>

    </main>

    <!-- ========================================
         Bottom Sheet 2／新增／編輯事件表單
    ========================================= -->
    <div class="sheet-overlay" id="event-form-overlay" hidden>
      <section class="bottom-sheet slide-up" id="event-form-sheet" aria-label="新增事件">
        <span class="sheet-handle" aria-hidden="true"></span>
        <button class="sheet-close" id="event-form-close" type="button" aria-label="關閉">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>

        <h3 class="sheet-section__title" id="event-form-title">新增事件</h3>

        <form class="event-form" id="event-form">
          <!-- 編輯模式時帶入既有事件 id，新增模式為空字串 -->
          <input type="hidden" id="event-id" name="id" value="" />

          <label class="form-field">
            <span class="form-field__label">標題</span>
            <input type="text" id="event-title" name="title" required autocomplete="off" />
          </label>

          <label class="form-field">
            <span class="form-field__label">日期</span>
            <input type="date" id="event-date" name="date" required />
          </label>

          <label class="form-field">
            <span class="form-field__label">時間（可選）</span>
            <input type="time" id="event-time" name="time" />
          </label>

          <div class="form-field">
            <span class="form-field__label">分類</span>
            <div class="category-select" id="event-category-select">
              <button class="category-chip is-active" type="button" data-category="activity">活動</button>
              <button class="category-chip" type="button" data-category="race">賽事</button>
              <button class="category-chip" type="button" data-category="reminder">提醒</button>
              <button class="category-chip" type="button" data-category="other">其他</button>
            </div>
          </div>

          <label class="form-field">
            <span class="form-field__label">備註（可選）</span>
            <textarea id="event-note" name="note" rows="2"></textarea>
          </label>

          <div class="form-actions">
            <button class="btn btn--secondary" id="event-form-cancel" type="button">取消</button>
            <button class="btn btn--primary" id="event-form-submit" type="submit">儲存</button>
          </div>

          <!-- 僅編輯模式顯示：刪除入口 -->
          <button class="btn btn--ghost-danger" id="event-form-delete" type="button" hidden>
            刪除事件
          </button>

          <!-- App 內建刪除確認列，不使用瀏覽器原生 confirm() -->
          <div class="delete-confirm" id="event-delete-confirm" hidden>
            <p class="delete-confirm__text">確定要刪除這筆事件嗎？此動作無法復原。</p>
            <div class="delete-confirm__actions">
              <button class="btn btn--secondary" id="event-delete-cancel" type="button">取消</button>
              <button class="btn btn--primary" id="event-delete-confirm-btn" type="button">確定刪除</button>
            </div>
          </div>
        </form>
      </section>
    </div>

    <!-- ========================================
         底部固定導覽列
    ========================================= -->
    <nav class="bottom-tab" aria-label="主要導覽">
      <button class="bottom-tab__item is-active" data-tab="home" type="button">
        <span class="bottom-tab__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M4 11.5 12 4l8 7.5M6 10v9h5v-5.5h2V19h5v-9" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/></svg>
        </span>
        <span class="bottom-tab__label">首頁</span>
      </button>
      <button class="bottom-tab__item" data-tab="calendar" type="button">
        <span class="bottom-tab__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><rect x="3.5" y="5" width="17" height="15" rx="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M3.5 9.5h17M8 3v3.5M16 3v3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </span>
        <span class="bottom-tab__label">月曆</span>
      </button>
      <button class="bottom-tab__item bottom-tab__item--add" data-tab="add" type="button" aria-label="新增">
        <span class="bottom-tab__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </span>
      </button>
      <button class="bottom-tab__item" data-tab="analytics" type="button">
        <span class="bottom-tab__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M4 20V10M12 20V4M20 20v-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </span>
        <span class="bottom-tab__label">分析</span>
      </button>
      <button class="bottom-tab__item" data-tab="more" type="button">
        <span class="bottom-tab__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="5" cy="12" r="1.4" fill="currentColor"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/><circle cx="19" cy="12" r="1.4" fill="currentColor"/></svg>
        </span>
        <span class="bottom-tab__label">更多</span>
      </button>
    </nav>

    <!-- 輕量提示訊息（取代瀏覽器 alert()），用於尚未開放的功能 -->
    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  </div>

  <!-- JavaScript（放在 body 尾端，defer 確保 DOM 就緒） -->
  <script src="app.js" defer></script>
</body>
</html>
